    <div class="contact-form">
        <div>
            <img class="contact-topimg"

    </div>



    <div class="container">
        <nav class="trslogo">
            <a href="#" class="trslogo-box">
                <img class="logo-img" alt="logo"
                    src="https://storage.googleapis.com/studio-design-asset-files/projects/p6ao4EvnWR/s-232x81_webp_ce04c7e0-45d3-4112-89b5-57a67886d72a.webp">

                <a href="#" class="topmenu">Top</a>
                <a href="#" class="businessmenu">Business</a>
                <a href="#" class="companymenu">Company</a>
                <a href="contact.html" class="contactmenu">Contact</a>
            </div>

            <button type="button" class="menu-button">
                <i class="material-icons">drag_handle</i>
            </button>
        </nav>

        <div class="contactpage-contact">
            <div class="contactpage-contact-header">
                <p class="contactpage-contact-text-en">Contact</p>
                <p class="contactpage-contact-text-jp">お問い合わせ</p>
            </div>

            <div class="contactpage-contact-box">
                <div class="contactpage-contact-flex">
                    <div class="contactpage-contact-boxpadding">
                        <a href="general" class="contactpage-text-generalbox">
                            <p class="contactpage-text-general">一般の方はこちら</p>
                        </a>
                        <a href="corporation" class="contactpage-text-corporationbox">
                            <p class="contactpage-text-general">法人の方はこちら</p>
                        </a>
                    </div>
                </div>
            </div>

            <div class="contactpage-contactform">
                <div class="contactpage-contactform-section">
                    <div class="contactpage-contactform-write">
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">お名前</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <input name="Name" placeholder="山田 太郎" required="" type="text" class="message-box">
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">フリガナ</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <input name="Name2" placeholder="ヤマダ タロウ" required="" type="text" class="message-box">
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">年齢</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <select name="Age" placeholder="山田 太郎" required="" type="text" class="message-box">
                                <option value="">-</option>
                                <option value="">18</option>
                                <option value="">19</option>
                                <option value="">20</option>
                                <option value="">21</option>
                                <option value="">22</option>
                                <option value="">23</option>
                                <option value="">24</option>
                                <option value="">25</option>
                                <option value="">26</option>
                                <option value="">27</option>
                                <option value="">28</option>
                                <option value="">29</option>
                                <option value="">30</option>
                                <option value="">31</option>
                                <option value="">32</option>
                                <option value="">33</option>
                                <option value="">34</option>
                                <option value="">35</option>
                                <option value="">36</option>
                                <option value="">37</option>
                                <option value="">38</option>
                                <option value="">39</option>
                                <option value="">40</option>
                                <option value="">41</option>
                                <option value="">42</option>
                                <option value="">43</option>
                                <option value="">44</option>
                                <option value="">45</option>
                                <option value="">46</option>
                                <option value="">47</option>
                                <option value="">48</option>
                                <option value="">49</option>
                                <option value="">50</option>
                            </select>
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">メールアドレス</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <input name="Address" placeholder="Your Mail Address" required="" type="text"
                                class="message-box">
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">メールアドレス(確認用)</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <input name="Address2" placeholder="Email Address" required="" type="text"
                                class="message-box">
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">電話番号</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <input name="Phone" placeholder="000-0000-0000" required="" type="text" class="message-box">
                        </div>
                        <div class="form-label">
                            <div class="form-title">
                                <p class="form-titlename">ご要望等(メッセージ)</p>
                                <P class="form-titlemust">*</P>
                            </div>
                            <textarea name="Message" placeholder="メッセージをご入力ください" required=""
                                class="message-box-textarea"></textarea>
                        </div>
                        <div class="form-check">
                            <label class="form-check-label">
                                <input name="Confirm" type="checkbox" class="form-checkbox" required>
                                <span class="form-checkbox-text">I agree to the Privacy Policy.</span>
                            </label>
                        </div>
                        <div class="send">
                            <button class="send-button">Send</button>
                        </div>
                    </div>
                </div>
